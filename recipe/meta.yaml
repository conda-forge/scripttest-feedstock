{% set version = "2.0.post1" %}
{% set sha256 = "4501effbc43f56a6bd004757109ac8d5ac65e5ff571b0cb1d7bf2126546dee53" %}

package:
  name: scripttest
  version: "{{ version }}"

source:
  fn: scripttest-{{ version }}.tar.gz
  url: https://github.com/pypa/scripttest/archive/{{ version }}.tar.gz
  sha256: "{{ sha256 }}"

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - scripttest

about:
  home: https://github.com/pypa/scripttest
  license: MIT
  license_family: MIT
  license_file: docs/license.rst
  summary: 'Helper to test command-line scripts.'
  dev_url: https://github.com/pypa/scripttest
  doc_url: https://scripttest.readthedocs.io

extra:
  recipe-maintainers:
    - dmaticzka
